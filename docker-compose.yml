services:
  meet-notes:
    build: .
    image: meet-notes:latest
    container_name: meet-notes
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./reports:/app/reports
      - ./transcripts:/app/transcripts
    networks:
      - infra_networks
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.meet-notes.rule=Host(`meet.${MAIN_DOMAIN}`)"
      - "traefik.http.routers.meet-notes.entrypoints=websecure"
      - "traefik.http.services.meet-notes.loadbalancer.server.port=8501"

networks:
  infra_networks:
    external: true
