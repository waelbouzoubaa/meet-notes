services:
  meet-notes:
    build: .
    image: meet-notes:latest
    container_name: meet-notes
    restart: unless-stopped
    ports:
      - "8501:8501"
    env_file:
      - .env
    volumes:
      - ./reports:/app/reports
      - ./transcripts:/app/transcripts
